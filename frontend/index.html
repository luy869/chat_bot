<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAG Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; }
      .chat-container { height: calc(100vh - 200px); overflow-y: auto; }
      .message { margin-bottom: 1rem; }
      .user-message { text-align: right; background-color: #dbeafe; padding: 0.5rem 1rem; border-radius: 8px; display: inline-block; max-width: 70%; }
      .assistant-message { background-color: #f3f4f6; padding: 0.5rem 1rem; border-radius: 8px; display: inline-block; max-width: 70%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const API_BASE = window.location.hostname === 'localhost' && window.location.port === '3000'
        ? 'http://localhost:4000'  // Docker開発環境
        : window.location.origin + '/api';  // 本番環境

      function ChatApp() {
        const [messages, setMessages] = React.useState([]);
        const [input, setInput] = React.useState('');
        const [loading, setLoading] = React.useState(false);
        const [collection, setCollection] = React.useState('default');
        const [collections, setCollections] = React.useState([]);
        const chatEndRef = React.useRef(null);

        const scrollToBottom = () => {
          chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
        };

        React.useEffect(scrollToBottom, [messages]);

        React.useEffect(() => {
          const fetchCollections = async () => {
            try {
              const response = await fetch(`${API_BASE}/collections/`);
              const data = await response.json();
              setCollections(data);
            } catch (error) {
              console.error('コレクション取得エラー:', error);
            }
          };
          fetchCollections();
        }, []);

        const handleSendMessage = async (e) => {
          e.preventDefault();
          if (!input.trim()) return;

          const userMessage = { role: 'user', content: input };
          setMessages(prev => [...prev, userMessage]);
          setInput('');
          setLoading(true);

          try {
            const response = await fetch(`${API_BASE}/chat/`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                question: input,
                collection_name: collection,
                stream: false
              })
            });

            const data = await response.json();
            const assistantMessage = {
              role: 'assistant',
              content: data.answer,
              sources: data.source_files
            };
            setMessages(prev => [...prev, assistantMessage]);
          } catch (error) {
            console.error('エラー:', error);
            setMessages(prev => [...prev, {
              role: 'assistant',
              content: 'エラーが発生しました'
            }]);
          } finally {
            setLoading(false);
          }
        };

        return (
          <div className="flex h-screen bg-white">
            {/* サイドバー */}
            <div className="w-64 bg-gray-100 p-4 border-r">
              <h1 className="text-xl font-bold mb-4">RAG Platform</h1>
              <div className="mb-4">
                <label className="block text-sm font-medium mb-2">コレクション:</label>
                <select
                  value={collection}
                  onChange={(e) => setCollection(e.target.value)}
                  className="w-full px-3 py-2 border border-gray-300 rounded"
                >
                  <option value="all">すべて</option>
                  {collections.map((col) => (
                    <option key={col.name} value={col.name}>
                      {col.name}
                    </option>
                  ))}
                </select>
              </div>
            </div>

            {/* チャットエリア */}
            <div className="flex-1 flex flex-col">
              {/* メッセージリスト */}
              <div className="chat-container p-4 flex-1">
                {messages.map((msg, idx) => (
                  <div key={idx} className="message">
                    {msg.role === 'user' ? (
                      <div className="user-message">{msg.content}</div>
                    ) : (
                      <div className="assistant-message">
                        <div>{msg.content}</div>
                        {msg.sources && (
                          <div className="text-xs text-gray-600 mt-2">
                            参照: {msg.sources.join(', ')}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                ))}
                {loading && <div className="text-gray-500">生成中...</div>}
                <div ref={chatEndRef} />
              </div>

              {/* 入力フォーム */}
              <form onSubmit={handleSendMessage} className="p-4 border-t">
                <div className="flex gap-2">
                  <input
                    type="text"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    placeholder="質問を入力..."
                    className="flex-1 px-4 py-2 border border-gray-300 rounded"
                    disabled={loading}
                  />
                  <button
                    type="submit"
                    disabled={loading}
                    className="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:bg-gray-400"
                  >
                    送信
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ChatApp />);
    </script>
  </body>
</html>
