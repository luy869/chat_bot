services:
  app:
    build: ./backend
    container_name: test-rag-platform
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "4000:8000"

  frontend:
    image: nginx:alpine
    container_name: test-rag-platform-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    depends_on:
      - app
