services:
  ollama:
    image: ollama/ollama:latest
    container_name: test-rag-platform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - CUDA_VISIBLE_DEVICES=${GPU_DEVICES:-0}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_PARALLEL:-1}
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && ollama pull qwen3.5:9b && wait" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: ./backend
    container_name: test-rag-platform
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "4000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434

  frontend:
    image: nginx:alpine
    container_name: test-rag-platform-frontend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    depends_on:
      - app

volumes:
  ollama_data:
