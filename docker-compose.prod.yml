services:
  ollama:
    image: ollama/ollama:latest
    container_name: rag-platform-ollama
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - CUDA_VISIBLE_DEVICES=${GPU_DEVICES:-0}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_PARALLEL:-1}
    entrypoint: [ "/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull nomic-embed-text && ollama pull qwen3.5:9b && wait" ]
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: ./backend
    container_name: rag-platform
    volumes:
      - ./backend:/app
      - /app/.venv
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: rag-platform-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  ollama_data:
